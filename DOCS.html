<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>CDevKit</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #F9F9F8;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #111;
    }
    .card {
      background: #fff;
      border: 1px solid #E8E8E6;
      border-radius: 12px;
      padding: 48px 56px;
      text-align: center;
      max-width: 420px;
    }
    .dot {
      width: 10px; height: 10px;
      background: #4CAF50;
      border-radius: 50%;
      display: inline-block;
      margin-bottom: 20px;
    }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 8px; }
    p  { font-size: 13px; color: #888; line-height: 1.6; }
    code {
      display: inline-block;
      margin-top: 20px;
      background: #F4F4F2;
      border: 1px solid #E0E0DE;
      border-radius: 6px;
      padding: 6px 14px;
      font-size: 12px;
      color: #555;
      font-family: 'Courier New', monospace;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="dot"></div>
    <h1>CDevKit Server</h1>
    <p>Your local server is running.<br>Add your routes and pages here.</p>
    <code>http://127.0.0.1:5000</code>
  </div>
</body>
</html>
